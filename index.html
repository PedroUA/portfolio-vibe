<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Teste</title>
    <!-- Importando a fonte Inter da Google Fonts para um aspeto mais premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico e estilo global */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a; /* Fundo escuro moderno (Slate 900) */
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center; /* Centra horizontalmente */
            align-items: center;     /* Centra verticalmente */
            overflow: hidden;
        }

        /* Estilo do texto "Shibulibi" */
        h1 {
            font-size: 6rem;
            font-weight: 800;
            margin: 0;
            
            /* Efeito de Gradiente no texto */
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            /* Brilho suave à volta do texto */
            text-shadow: 0 4px 30px rgba(129, 140, 248, 0.3);
            
            /* Micro-animação flutuante */
            animation: float 4s ease-in-out infinite;
        }

        /* Definição da animação flutuante */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* Regras de Responsividade para Mobile (Ecrãs mais pequenos) */
        @media (max-width: 768px) {
            h1 {
                font-size: 3.5rem; /* Tamanho de letra reduzido para caber no telemóvel */
                text-align: center;
                padding: 0 15px; /* Um pequeno espaçamento lateral para o texto não colar às bordas */
            }
            
            /* Suavizar a animação no telemóvel */
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-8px); }
                100% { transform: translateY(0px); }
            }
        }
    </style>
</head>
<body>
    <h1>Shibulibi</h1>
</body>
</html>
