<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pedro Lemos — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <div class="version-badge" id="version-badge">Not the final version</div>

    <div class="sections-wrapper" id="sections-wrapper">
      
      <!-- SECTION 1: LANDING -->
      <section class="section section--landing" id="sec-landing">
        <!-- Photo Column -->
        <div class="col col--photo" id="col-photo">
          <img
            src="photo.png"
            alt="Pedro Lemos portrait"
            class="photo"
            id="photo-portrait"
          />
        </div>

        <!-- Grid lines (vertical dividers) -->
        <div class="col col--2" id="col-2"></div>
        <div class="col col--3" id="col-3"></div>
        <div class="col col--4" id="col-4"></div>
        <div class="col col--5" id="col-5"></div>

        <!-- Content block -->
        <div class="content-block" id="content-block">
          <!-- Name container -->
          <div class="name-container" id="name-container">
            <p class="label-portfolio" id="label-portfolio">Portfolio</p>
            <h1 class="name" id="name-heading">Pedro Lemos</h1>
          </div>

          <!-- Skills container -->
          <div class="skills-container" id="skills-container">
            <p class="skill skill--1" id="skill-multimedia">Multimedia Artist</p>
            <p class="skill skill--2" id="skill-uiux">UI/UX Design</p>
            <p class="skill skill--3" id="skill-game">Game Design</p>
            <p class="skill skill--4" id="skill-sound">Sound Design</p>
            <p class="skill skill--5" id="skill-3d">3D Modeling</p>
          </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator" id="scroll-indicator">
          <div class="scroll-line"></div>
        </div>
      </section>

      <!-- SECTION 2: SPECIALTIES -->
      <section class="section section--specialties" id="sec-specialties">
        <!-- Coluna 1 (About me) -->
        <div class="col col--about" id="col-about">
          <img
            src="assets/about-profile.png"
            alt="About Pedro Lemos"
            class="about-photo about-photo--default"
            id="about-photo"
          />
          <img
            src="assets/PhotoMe_Hover.png"
            alt="About Pedro Lemos Hover"
            class="about-photo about-photo--hover"
            id="about-photo-hover"
          />
          <div class="about-title-container" id="about-title-container">
            <p class="about-title">About me</p>
          </div>
        </div>

        <!-- Coluna 2 (UI/UX) -->
        <div class="col col--specialty col--uiux" id="col-uiux">
          <div class="specialty-graphic graphic--uiux" id="graphic-uiux">
            <img src="assets/wireframe-1.svg" class="wireframe-1" alt="Wireframe 1" />
            <img src="assets/wireframe-2.svg" class="wireframe-2" alt="Wireframe 2" />
            <img src="assets/phone.svg" class="phone" alt="Phone" />
          </div>
          <div class="specialty-label-container">
            <p class="specialty-label">UI/UX</p>
          </div>
        </div>

        <!-- Coluna 3 (3D Modeling) -->
        <div class="col col--specialty col--3d" id="col-3d">
          <div class="specialty-graphic graphic--3d" id="graphic-3d">

          </div>
          <div class="specialty-label-container">
            <p class="specialty-label">3D Modeling</p>
          </div>
        </div>
